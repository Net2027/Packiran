<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>پنل مدیریت - پک ایران</title>
<script src="https://unpkg.com/@phosphor-icons/web" defer></script>
<style>
    @font-face {
        font-family: 'Vazir';
        src: url('fonts/Vazir.woff2') format('woff2');
        font-weight: normal;
    }
    @font-face {
        font-family: 'Vazir';
        src: url('fonts/Vazir-Medium.woff2') format('woff2');
        font-weight: 500;
    }
    @font-face {
        font-family: 'Vazir';
        src: url('fonts/Vazir-Bold.woff2') format('woff2');
        font-weight: bold;
    }

    :root {
        --bg-dark: #0f172a;
        --bg-darker: #020617;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --primary-cyan: #06b6d4;
        --primary-blue: #3b82f6;
        --primary-gradient: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        --glass-bg: rgba(15, 23, 42, 0.7);
        --glass-bg-soft: rgba(15, 23, 42, 0.45);
        --glass-border: rgba(255, 255, 255, 0.08);
        --danger: #f43f5e;
        --success: #22c55e;
        --font-family: 'Vazir', sans-serif;
        --transition: all 0.25s ease;
        --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: thin; scrollbar-color: var(--primary-cyan) var(--bg-darker); }
    ::-webkit-scrollbar { width: 9px; }
    ::-webkit-scrollbar-track { background: var(--bg-darker); }
    ::-webkit-scrollbar-thumb { background: var(--primary-gradient); border-radius: 10px; }

    body {
        font-family: var(--font-family);
        background: var(--bg-darker);
        background-image:
            radial-gradient(circle at 15% 15%, rgba(6,182,212,0.10), transparent 42%),
            radial-gradient(circle at 85% 75%, rgba(59,130,246,0.10), transparent 42%);
        background-attachment: fixed;
        color: var(--text-main);
        min-height: 100vh;
    }

    button { font-family: var(--font-family); cursor: pointer; border: none; border-radius: 10px; transition: var(--transition); }
    input, textarea { font-family: var(--font-family); }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== اسپینر ===== */
    .spinner {
        width: 30px; height: 30px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: var(--primary-cyan);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto;
    }
    .spinner.small { width: 16px; height: 16px; border-width: 2px; display: inline-block; vertical-align: middle; margin-left: 8px; }

    /* ===== توست‌ها ===== */
    #toast-container {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 3000;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 320px;
    }
    .toast {
        background: var(--bg-dark);
        border: 1px solid var(--glass-border);
        border-right: 4px solid var(--primary-cyan);
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 0.85rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        animation: fadeInUp 0.25s ease;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .toast.error { border-right-color: var(--danger); }
    .toast.success { border-right-color: var(--success); }
    .toast i { font-size: 1.2rem; }
    .toast.error i { color: var(--danger); }
    .toast.success i { color: var(--success); }

    /* ===== صفحه ورود ===== */
    #login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .login-box {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 45px 32px;
        width: 100%;
        max-width: 380px;
        text-align: center;
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        animation: fadeInUp 0.4s ease;
    }
    .login-box > i {
        font-size: 3.2rem;
        color: var(--primary-cyan);
        margin-bottom: 15px;
        filter: drop-shadow(0 0 15px rgba(6,182,212,0.5));
    }
    .login-box h1 { font-size: 1.35rem; margin-bottom: 8px; }
    .login-box p.sub { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 25px; }

    .field-wrap { position: relative; margin-bottom: 14px; }
    .field-wrap i {
        position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
        color: var(--text-muted); font-size: 1.05rem; pointer-events: none;
    }
    input[type=text], input[type=password] {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        padding: 13px 42px 13px 14px;
        color: var(--text-main);
        font-size: 0.95rem;
        outline: none;
        transition: var(--transition);
    }
    input[type=text]:focus, input[type=password]:focus { border-color: var(--primary-cyan); background: rgba(6,182,212,0.06); }

    textarea {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        padding: 12px 14px;
        color: var(--text-main);
        font-size: 0.9rem;
        outline: none;
        resize: vertical;
        min-height: 70px;
        transition: var(--transition);
    }
    textarea:focus { border-color: var(--primary-cyan); }

    .btn-primary {
        width: 100%;
        background: var(--primary-gradient);
        color: #fff;
        font-weight: 700;
        padding: 13px;
        font-size: 0.98rem;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover { filter: brightness(1.12); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(6,182,212,0.3); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-text {
        color: var(--danger);
        font-size: 0.82rem;
        margin-top: 12px;
        min-height: 18px;
    }

    /* ===== داشبورد ===== */
    #dashboard { display: none; }

    header.admin-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 26px;
        background: var(--glass-bg);
        border-bottom: 1px solid var(--glass-border);
        backdrop-filter: blur(14px);
        position: sticky;
        top: 0;
        z-index: 100;
        flex-wrap: wrap;
        gap: 12px;
    }
    header.admin-header h1 {
        font-size: 1.15rem;
        display: flex;
        align-items: center;
        gap: 9px;
    }
    header.admin-header h1 i { color: var(--primary-cyan); font-size: 1.4rem; }

    .btn-logout {
        background: transparent;
        border: 1px solid var(--glass-border);
        color: var(--text-muted);
        padding: 9px 18px;
        font-size: 0.83rem;
        display: flex; align-items: center; gap: 6px;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    .tabs {
        display: flex;
        gap: 8px;
        padding: 18px 26px 0;
        flex-wrap: wrap;
        max-width: 1100px;
        margin: 0 auto;
    }
    .tab-btn {
        background: var(--glass-bg-soft);
        border: 1px solid var(--glass-border);
        color: var(--text-muted);
        padding: 11px 20px;
        font-size: 0.88rem;
        font-weight: 500;
        border-radius: 12px 12px 0 0;
        display: flex; align-items: center; gap: 8px;
        transition: var(--transition);
    }
    .tab-btn:hover { color: var(--text-main); }
    .tab-btn.active {
        color: var(--primary-cyan);
        border-color: var(--primary-cyan);
        border-bottom-color: transparent;
        background: rgba(6,182,212,0.12);
    }
    .tab-count {
        background: rgba(255,255,255,0.1);
        color: var(--text-muted);
        font-size: 0.72rem;
        padding: 1px 8px;
        border-radius: 20px;
        min-width: 18px;
        text-align: center;
    }
    .tab-btn.active .tab-count { background: var(--primary-cyan); color: #06222c; }

    main {
        padding: 22px 26px 70px;
        max-width: 1100px;
        margin: 0 auto;
    }

    .category-panel { display: none; animation: fadeInUp 0.3s ease; }
    .category-panel.active { display: block; }

    .panel-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .toolbar-left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .btn-add {
        background: var(--primary-gradient);
        color: #fff;
        font-weight: 700;
        padding: 11px 22px;
        font-size: 0.88rem;
        display: inline-flex;
        align-items: center;
        gap: 7px;
    }
    .btn-add:hover { filter: brightness(1.12); box-shadow: 0 6px 18px rgba(6,182,212,0.3); }

    .search-box {
        position: relative;
        min-width: 200px;
    }
    .search-box i {
        position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        color: var(--text-muted); font-size: 1rem; pointer-events: none;
    }
    .search-box input {
        background: var(--glass-bg-soft);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        padding: 9px 38px 9px 14px;
        color: var(--text-main);
        font-size: 0.85rem;
        outline: none;
        width: 100%;
        transition: var(--transition);
    }
    .search-box input:focus { border-color: var(--primary-cyan); }

    .refresh-note {
        color: var(--text-muted);
        font-size: 0.78rem;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    /* فرم افزودن/ویرایش */
    .item-form {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        padding: 0;
        margin-bottom: 22px;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition: max-height 0.35s ease, opacity 0.3s ease, padding 0.35s ease;
    }
    .item-form.open {
        padding: 22px;
        max-height: 1400px;
        opacity: 1;
    }

    .item-form h3 {
        font-size: 1rem;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--primary-cyan);
    }

    .item-form label {
        display: block;
        font-size: 0.83rem;
        color: var(--text-muted);
        margin-bottom: 6px;
        margin-top: 14px;
    }
    .item-form label:first-of-type { margin-top: 0; }

    .form-row {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
    }
    .form-row > div { flex: 1; min-width: 220px; }

    .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }
    .btn-submit {
        background: var(--primary-gradient);
        color: #fff;
        font-weight: 700;
        padding: 11px 26px;
        font-size: 0.88rem;
        display: flex; align-items: center; gap: 6px;
    }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-cancel {
        background: transparent;
        border: 1px solid var(--glass-border);
        color: var(--text-muted);
        padding: 11px 22px;
        font-size: 0.88rem;
    }
    .btn-cancel:hover { border-color: var(--text-muted); color: var(--text-main); }

    .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 9px;
        font-size: 0.82rem;
        color: var(--text-muted);
    }
    .checkbox-row input { width: auto; margin: 0; accent-color: var(--primary-cyan); }

    .form-msg {
        margin-top: 14px;
        font-size: 0.85rem;
        min-height: 18px;
        display: flex; align-items: center; gap: 6px;
    }
    .form-msg.error { color: var(--danger); }
    .form-msg.success { color: var(--success); }

    /* ورودی فایل استایل‌شده */
    .file-drop {
        position: relative;
        border: 1.5px dashed var(--glass-border);
        border-radius: 10px;
        padding: 16px;
        text-align: center;
        cursor: pointer;
        transition: var(--transition);
        background: rgba(255,255,255,0.02);
    }
    .file-drop:hover { border-color: var(--primary-cyan); background: rgba(6,182,212,0.05); }
    .file-drop input[type=file] {
        position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .file-drop i { font-size: 1.4rem; color: var(--text-muted); display: block; margin-bottom: 6px; }
    .file-drop .file-drop-text { font-size: 0.8rem; color: var(--text-muted); word-break: break-all; }
    .file-drop.has-file { border-color: var(--primary-cyan); border-style: solid; }
    .file-drop.has-file i { color: var(--primary-cyan); }
    .file-drop.has-file .file-drop-text { color: var(--text-main); }

    /* ===== نوار پیشرفت آپلود ===== */
    .upload-progress {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
    }
    .upload-progress-track {
        flex: 1;
        height: 8px;
        border-radius: 20px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
    }
    .upload-progress-bar {
        height: 100%;
        width: 0%;
        background: var(--primary-gradient);
        border-radius: 20px;
        transition: width 0.25s ease;
    }
    .upload-progress-label {
        font-size: 0.72rem;
        color: var(--text-muted);
        white-space: nowrap;
        min-width: 70px;
        text-align: left;
    }

    /* لیست کارت‌ها */
    .item-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 14px;
    }

    .item-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: var(--transition);
        animation: fadeInUp 0.3s ease backwards;
    }
    .item-card:hover { border-color: rgba(6,182,212,0.35); transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.25); }

    .item-info .item-name { font-weight: 700; font-size: 1rem; margin-bottom: 5px; }
    .item-info .item-desc {
        color: var(--text-muted);
        font-size: 0.8rem;
        line-height: 1.6;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .item-badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
    }
    .item-badge {
        font-size: 0.7rem;
        padding: 4px 10px;
        border-radius: 20px;
        border: 1px solid rgba(6,182,212,0.35);
        color: var(--primary-cyan);
        background: rgba(6,182,212,0.1);
        display: inline-flex; align-items: center; gap: 4px;
    }
    .item-badge.missing {
        border-color: rgba(148,163,184,0.25);
        color: var(--text-muted);
        background: transparent;
    }

    .item-actions { display: flex; gap: 8px; margin-top: auto; }
    .btn-icon {
        flex: 1;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--glass-border);
        color: var(--text-muted);
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 0.8rem;
    }
    .btn-icon:hover { border-color: var(--primary-cyan); color: var(--primary-cyan); background: rgba(6,182,212,0.08); }
    .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(244,63,94,0.08); }

    .empty-state, .loading-state {
        grid-column: 1 / -1;
        text-align: center;
        color: var(--text-muted);
        padding: 55px 20px;
        font-size: 0.9rem;
    }
    .empty-state i, .loading-state i { font-size: 2.6rem; display: block; margin-bottom: 12px; opacity: 0.5; }

    /* اسکلتون لودینگ */
    .skeleton-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 14px;
        grid-column: 1 / -1;
    }
    .skeleton-card {
        height: 140px;
        border-radius: var(--radius);
        background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 37%, rgba(255,255,255,0.03) 63%);
        background-size: 400% 100%;
        animation: shimmer 1.4s ease infinite;
        border: 1px solid var(--glass-border);
    }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

    /* مودال تایید حذف */
    .confirm-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(2,6,23,0.75);
        backdrop-filter: blur(6px);
        z-index: 2000;
        align-items: center; justify-content: center;
        padding: 20px;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
        background: var(--bg-dark);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 28px;
        max-width: 340px;
        text-align: center;
        animation: fadeInUp 0.25s ease;
    }
    .confirm-box i { font-size: 2.2rem; color: var(--danger); margin-bottom: 12px; }
    .confirm-box p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.7; }
    .confirm-box p b { color: var(--text-main); }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-actions button { flex: 1; padding: 10px; font-size: 0.85rem; }
    .btn-confirm-delete { background: var(--danger); color: #fff; font-weight: 700; }
    .btn-confirm-delete:hover { filter: brightness(1.1); }
    .btn-confirm-cancel { background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); }

    @media (max-width: 600px) {
        header.admin-header { padding: 14px 16px; }
        main { padding: 16px; }
        .tabs { padding: 14px 16px 0; }
        .item-list { grid-template-columns: 1fr; }
        .panel-toolbar { flex-direction: column; align-items: stretch; }
        .search-box { min-width: 0; }
    }
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- ===== صفحه ورود ادمین ===== -->
<div id="login-screen">
    <div class="login-box">
        <i class="ph-fill ph-shield-check"></i>
        <h1>ورود به پنل مدیریت</h1>
        <p class="sub">پک ایران</p>
        <form id="login-form">
            <div class="field-wrap">
                <input type="text" id="login-username" placeholder="نام کاربری" autocomplete="username" required>
                <i class="ph-bold ph-user"></i>
            </div>
            <div class="field-wrap">
                <input type="password" id="login-password" placeholder="رمز عبور" autocomplete="current-password" required>
                <i class="ph-bold ph-lock-key"></i>
            </div>
            <button type="submit" class="btn-primary" id="login-submit-btn">ورود</button>
            <div class="error-text" id="login-error"></div>
        </form>
    </div>
</div>

<!-- ===== داشبورد ===== -->
<div id="dashboard">
    <header class="admin-header">
        <h1><i class="ph-fill ph-shield-check"></i> پنل مدیریت پک ایران</h1>
        <button class="btn-logout" id="logout-btn"><i class="ph-bold ph-sign-out"></i> خروج</button>
    </header>

    <div class="tabs" id="tabs"></div>

    <main id="panels"></main>
</div>

<!-- ===== مودال تایید حذف ===== -->
<div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
        <i class="ph-fill ph-warning-circle"></i>
        <p>مطمئنی می‌خوای <b id="confirm-item-name"></b> رو کامل حذف کنی؟<br>این کار قابل بازگشت نیست.</p>
        <div class="confirm-actions">
            <button class="btn-confirm-cancel" id="confirm-cancel-btn">انصراف</button>
            <button class="btn-confirm-delete" id="confirm-delete-btn">حذف کن</button>
        </div>
    </div>
</div>

<script>
const API_BASE = 'https://web-production-b6b4a.up.railway.app';

const CATEGORIES = {
    downloads: { label: 'دانلود ماینکرفت', icon: 'ph-download-simple', type: 'single', compatibility: false },
    packs: { label: 'ریسورس پک‌ها', icon: 'ph-package', type: 'dual', compatibility: false },
    mods: { label: 'مود ها', icon: 'ph-puzzle-piece', type: 'single', compatibility: true },
    shaders: { label: 'شیدر ها', icon: 'ph-sparkle', type: 'single', compatibility: true },
    films: { label: 'فیلم ها', icon: 'ph-video-camera', type: 'link', compatibility: false },
};

let adminToken = sessionStorage.getItem('adminToken') || null;
let activeCategory = 'packs';
let categoryData = {}; // کش محلی برای جستجو بدون درخواست جدید
let pendingDelete = null; // { key, name }

// ===== ابزار کمکی =====
function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
}

function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? 'ph-check-circle' : 'ph-x-circle';
    toast.innerHTML = `<i class="ph-fill ${icon}"></i><span>${escapeHtml(message)}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-20px)';
        setTimeout(() => toast.remove(), 300);
    }, 3200);
}

async function apiRequest(path, options = {}) {
    const headers = options.headers || {};
    if (adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
    const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
    let data = null;
    try { data = await res.json(); } catch (e) { /* بدنه‌ی خالی */ }
    if (!res.ok) {
        throw new Error((data && data.error) || `خطای ${res.status}`);
    }
    return data;
}

// ===== ورود / خروج =====
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-submit-btn');
    errorEl.textContent = '';
    submitBtn.disabled = true;
    submitBtn.innerHTML = 'در حال ورود <span class="spinner small"></span>';

    try {
        const data = await apiRequest('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
        });
        adminToken = data.token;
        sessionStorage.setItem('adminToken', adminToken);
        showDashboard();
    } catch (err) {
        errorEl.textContent = err.message || 'خطا در ورود';
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'ورود';
    }
});

document.getElementById('logout-btn').addEventListener('click', () => {
    adminToken = null;
    sessionStorage.removeItem('adminToken');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
});

function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    buildTabsAndPanels();
    loadCategory(activeCategory);
}

// ===== ساخت تب‌ها و پنل‌ها =====
function buildTabsAndPanels() {
    const tabsEl = document.getElementById('tabs');
    const panelsEl = document.getElementById('panels');
    tabsEl.innerHTML = '';
    panelsEl.innerHTML = '';

    Object.keys(CATEGORIES).forEach((key) => {
        const cfg = CATEGORIES[key];

        const tabBtn = document.createElement('button');
        tabBtn.className = 'tab-btn' + (key === activeCategory ? ' active' : '');
        tabBtn.id = `tab-btn-${key}`;
        tabBtn.innerHTML = `<i class="ph-fill ${cfg.icon}"></i> ${cfg.label} <span class="tab-count" id="tab-count-${key}">–</span>`;
        tabBtn.addEventListener('click', () => switchCategory(key));
        tabsEl.appendChild(tabBtn);

        const panel = document.createElement('div');
        panel.className = 'category-panel' + (key === activeCategory ? ' active' : '');
        panel.id = `panel-${key}`;
        panel.innerHTML = `
            <div class="panel-toolbar">
                <div class="toolbar-left">
                    <button class="btn-add" data-add="${key}"><i class="ph-bold ph-plus"></i> افزودن ${cfg.label}</button>
                    <div class="search-box">
                        <input type="text" id="search-${key}" placeholder="جستجو بر اساس اسم...">
                        <i class="ph-bold ph-magnifying-glass"></i>
                    </div>
                </div>
                <span class="refresh-note"><i class="ph-bold ph-lightning"></i> تغییرات معمولاً فوری روی سایت اعمال می‌شه</span>
            </div>
            <div class="item-form" id="form-${key}"></div>
            <div class="item-list" id="list-${key}">
                <div class="skeleton-grid">
                    <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
                </div>
            </div>
        `;
        panelsEl.appendChild(panel);

        panel.querySelector(`[data-add="${key}"]`).addEventListener('click', () => openForm(key, null));
        panel.querySelector(`#search-${key}`).addEventListener('input', (e) => {
            filterList(key, e.target.value.trim());
        });
    });
}

function switchCategory(key) {
    activeCategory = key;
    Object.keys(CATEGORIES).forEach((k) => {
        document.getElementById(`tab-btn-${k}`).classList.toggle('active', k === key);
        document.getElementById(`panel-${k}`).classList.toggle('active', k === key);
    });
    if (!categoryData[key]) {
        loadCategory(key);
    }
}

// ===== بارگذاری لیست هر دسته =====
async function loadCategory(key) {
    const listEl = document.getElementById(`list-${key}`);
    listEl.innerHTML = '<div class="skeleton-grid"><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div></div>';
    try {
        const items = await apiRequest(`/api/admin/${key}`);
        categoryData[key] = items;
        document.getElementById(`tab-count-${key}`).textContent = items.length;
        renderList(key, items);
    } catch (err) {
        listEl.innerHTML = `<div class="empty-state"><i class="ph-fill ph-wifi-x"></i>خطا در بارگذاری: ${escapeHtml(err.message)}</div>`;
        showToast(err.message || 'خطا در بارگذاری اطلاعات', 'error');
    }
}

function filterList(key, query) {
    const items = categoryData[key] || [];
    if (!query) {
        renderList(key, items);
        return;
    }
    const filtered = items.filter((i) => i.name.toLowerCase().includes(query.toLowerCase()));
    renderList(key, filtered, true);
}

function renderList(key, items, isFiltered = false) {
    const cfg = CATEGORIES[key];
    const listEl = document.getElementById(`list-${key}`);

    if (!items || items.length === 0) {
        listEl.innerHTML = isFiltered
            ? '<div class="empty-state"><i class="ph-fill ph-magnifying-glass"></i>چیزی با این اسم پیدا نشد</div>'
            : '<div class="empty-state"><i class="ph-fill ph-inbox"></i>هنوز چیزی اضافه نشده</div>';
        return;
    }

    listEl.innerHTML = items.map((item, idx) => {
        let badges = '';
        if (cfg.type === 'dual') {
            badges = `
                <span class="item-badge ${item.java ? '' : 'missing'}"><i class="ph-fill ph-cube"></i>${item.java ? 'جاوا' : 'بدون جاوا'}</span>
                <span class="item-badge ${item.bedrock ? '' : 'missing'}"><i class="ph-fill ph-cube-transparent"></i>${item.bedrock ? 'بدراک' : 'بدون بدراک'}</span>
            `;
        } else if (cfg.type === 'single') {
            badges = `<span class="item-badge ${item.file ? '' : 'missing'}"><i class="ph-fill ph-file"></i>${item.file ? 'فایل موجود' : 'بدون فایل'}</span>`;
            if (cfg.compatibility && item.compatibility) {
                badges += `<span class="item-badge"><i class="ph-fill ph-check-circle"></i>${escapeHtml(item.compatibility)}</span>`;
            }
        } else if (cfg.type === 'link') {
            badges = `<span class="item-badge ${item.link ? '' : 'missing'}"><i class="ph-fill ph-link"></i>${item.link ? 'لینک موجود' : 'بدون لینک'}</span>`;
        }

        return `
            <div class="item-card" style="animation-delay:${Math.min(idx * 0.04, 0.4)}s">
                <div class="item-info">
                    <div class="item-name">${escapeHtml(item.name)}</div>
                    ${item.description ? `<div class="item-desc">${escapeHtml(item.description)}</div>` : ''}
                </div>
                <div class="item-badges">${badges}</div>
                <div class="item-actions">
                    <button class="btn-icon" data-edit="${escapeHtml(item.name)}"><i class="ph-bold ph-pencil-simple"></i> ویرایش</button>
                    <button class="btn-icon danger" data-delete="${escapeHtml(item.name)}"><i class="ph-bold ph-trash"></i> حذف</button>
                </div>
            </div>
        `;
    }).join('');

    listEl.querySelectorAll('[data-edit]').forEach((btn) => {
        btn.addEventListener('click', () => {
            const name = btn.getAttribute('data-edit');
            const item = items.find((i) => i.name === name);
            openForm(key, item);
        });
    });

    listEl.querySelectorAll('[data-delete]').forEach((btn) => {
        btn.addEventListener('click', () => askDelete(key, btn.getAttribute('data-delete')));
    });
}

// ===== مودال تایید حذف =====
function askDelete(key, name) {
    pendingDelete = { key, name };
    document.getElementById('confirm-item-name').textContent = `«${name}»`;
    document.getElementById('confirm-overlay').classList.add('open');
}

document.getElementById('confirm-cancel-btn').addEventListener('click', () => {
    pendingDelete = null;
    document.getElementById('confirm-overlay').classList.remove('open');
});

document.getElementById('confirm-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'confirm-overlay') {
        pendingDelete = null;
        document.getElementById('confirm-overlay').classList.remove('open');
    }
});

document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
    if (!pendingDelete) return;
    const { key, name } = pendingDelete;
    const btn = document.getElementById('confirm-delete-btn');
    btn.disabled = true;
    btn.innerHTML = 'در حال حذف <span class="spinner small"></span>';
    try {
        await apiRequest(`/api/admin/${key}/${encodeURIComponent(name)}`, { method: 'DELETE' });
        showToast(`«${name}» حذف شد`, 'success');
        document.getElementById('confirm-overlay').classList.remove('open');
        loadCategory(key);
    } catch (err) {
        showToast('خطا در حذف: ' + err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'حذف کن';
        pendingDelete = null;
    }
});

// ===== فرم افزودن/ویرایش =====
// ===== آپلود تکه‌تکه (Chunked Upload) با نوار پیشرفت و تلاش مجدد خودکار =====
const CHUNK_SIZE = 512 * 1024; // ۵۱۲ کیلوبایت — روی اتصال ناپایدار/فیلترشکن مقاوم‌تره
const MAX_CHUNK_RETRIES = 4;

let uploadedFiles = {};  // fieldId -> { uploadId, filename }
let activeUploads = new Set(); // fieldId هایی که الان در حال آپلودن

function updateSubmitButtonsState() {
    document.querySelectorAll('.btn-submit').forEach((btn) => {
        btn.disabled = activeUploads.size > 0;
    });
}

function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' بایت';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' کیلوبایت';
    return (bytes / (1024 * 1024)).toFixed(1) + ' مگابایت';
}

async function uploadFileChunked(file, onProgress) {
    const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

    const initData = await apiRequest('/api/admin/upload/init', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: file.name, total_chunks: totalChunks }),
    });
    const uploadId = initData.upload_id;

    for (let i = 0; i < totalChunks; i++) {
        const start = i * CHUNK_SIZE;
        const end = Math.min(start + CHUNK_SIZE, file.size);
        const chunkBlob = file.slice(start, end);

        let lastError = null;
        let success = false;
        for (let attempt = 1; attempt <= MAX_CHUNK_RETRIES; attempt++) {
            try {
                const fd = new FormData();
                fd.append('index', String(i));
                fd.append('chunk', chunkBlob, file.name);
                await apiRequest(`/api/admin/upload/chunk/${uploadId}`, { method: 'POST', body: fd });
                success = true;
                break;
            } catch (err) {
                lastError = err;
                // یه‌کم صبر کن و دوباره امتحان کن (برای اتصال‌های ناپایدار/فیلترشکن)
                await new Promise((r) => setTimeout(r, 700 * attempt));
            }
        }
        if (!success) {
            throw new Error(`آپلود تکه ${i + 1} از ${totalChunks} بعد از چند تلاش شکست خورد: ${lastError ? lastError.message : ''}`);
        }

        onProgress(Math.round(((i + 1) / totalChunks) * 100), i + 1, totalChunks);
    }

    await apiRequest(`/api/admin/upload/complete/${uploadId}`, { method: 'POST' });
    return uploadId;
}

function fileDropHtml(fieldId, labelText) {
    return `
        <div class="file-drop" id="drop-${fieldId}">
            <input type="file" id="${fieldId}">
            <i class="ph-bold ph-upload-simple"></i>
            <div class="file-drop-text" id="drop-text-${fieldId}">${labelText}</div>
        </div>
        <div class="upload-progress" id="progress-wrap-${fieldId}" style="display:none;">
            <div class="upload-progress-track"><div class="upload-progress-bar" id="progress-bar-${fieldId}"></div></div>
            <span class="upload-progress-label" id="progress-label-${fieldId}">0%</span>
        </div>
    `;
}

function wireFileDrop(fieldId) {
    const input = document.getElementById(fieldId);
    const dropEl = document.getElementById(`drop-${fieldId}`);
    const textEl = document.getElementById(`drop-text-${fieldId}`);
    const progressWrap = document.getElementById(`progress-wrap-${fieldId}`);
    const progressBar = document.getElementById(`progress-bar-${fieldId}`);
    const progressLabel = document.getElementById(`progress-label-${fieldId}`);
    if (!input) return;

    input.addEventListener('change', async () => {
        const file = input.files[0];
        delete uploadedFiles[fieldId];

        if (!file) {
            dropEl.classList.remove('has-file');
            progressWrap.style.display = 'none';
            return;
        }

        dropEl.classList.add('has-file');
        textEl.textContent = `در حال آپلود... ${file.name} (${formatBytes(file.size)})`;
        progressWrap.style.display = 'flex';
        progressBar.style.width = '0%';
        progressLabel.textContent = '0%';

        activeUploads.add(fieldId);
        updateSubmitButtonsState();

        try {
            const uploadId = await uploadFileChunked(file, (percent, done, total) => {
                progressBar.style.width = percent + '%';
                progressLabel.textContent = `${percent}% (${done}/${total})`;
            });
            uploadedFiles[fieldId] = { uploadId, filename: file.name };
            textEl.innerHTML = `<i class="ph-fill ph-check-circle" style="color:var(--success)"></i> ${escapeHtml(file.name)}`;
            progressLabel.textContent = 'کامل شد ✓';
        } catch (err) {
            textEl.textContent = 'خطا در آپلود — دوباره کلیک کن و امتحان کن';
            dropEl.classList.remove('has-file');
            progressWrap.style.display = 'none';
            input.value = '';
            showToast(err.message || 'خطا در آپلود فایل', 'error');
        } finally {
            activeUploads.delete(fieldId);
            updateSubmitButtonsState();
        }
    });
}

function openForm(key, item) {
    const cfg = CATEGORIES[key];
    const formEl = document.getElementById(`form-${key}`);
    const isEdit = !!item;

    let fieldsHtml = `<h3><i class="ph-fill ${isEdit ? 'ph-pencil-simple' : 'ph-plus-circle'}"></i> ${isEdit ? 'ویرایش' : 'افزودن'} ${cfg.label}</h3>`;

    fieldsHtml += `
        <label>اسم</label>
        <input type="text" id="field-name-${key}" value="${isEdit ? escapeHtml(item.name) : ''}" ${isEdit ? 'disabled style="opacity:0.6"' : ''} placeholder="اسم دقیق (مثل نام پوشه روی گیت‌هاب)">
    `;

    fieldsHtml += `
        <label>توضیحات (اختیاری)</label>
        <textarea id="field-description-${key}" placeholder="توضیح کوتاه، خالی بذار یعنی توضیحی نباشه">${isEdit ? escapeHtml(item.description || '') : ''}</textarea>
    `;

    if (cfg.compatibility) {
        fieldsHtml += `
            <label>سازگاری (اختیاری، مثلاً «سازگار با جاوا»)</label>
            <input type="text" id="field-compatibility-${key}" value="${isEdit ? escapeHtml(item.compatibility || '') : ''}" placeholder="خالی بذار یعنی نشونی نمایش داده نشه">
        `;
    }

    if (cfg.type === 'dual') {
        fieldsHtml += `
            <div class="form-row">
                <div>
                    <label>فایل جاوا (اختیاری)</label>
                    ${fileDropHtml(`field-java-${key}`, 'کلیک کن یا فایل رو بکش اینجا')}
                    ${isEdit && item.java ? `<div class="checkbox-row"><input type="checkbox" id="field-remove-java-${key}"><label for="field-remove-java-${key}" style="margin:0">حذف فایل جاوای فعلی</label></div>` : ''}
                </div>
                <div>
                    <label>فایل بدراک (اختیاری)</label>
                    ${fileDropHtml(`field-bedrock-${key}`, 'کلیک کن یا فایل رو بکش اینجا')}
                    ${isEdit && item.bedrock ? `<div class="checkbox-row"><input type="checkbox" id="field-remove-bedrock-${key}"><label for="field-remove-bedrock-${key}" style="margin:0">حذف فایل بدراک فعلی</label></div>` : ''}
                </div>
            </div>
        `;
    } else if (cfg.type === 'single') {
        fieldsHtml += `
            <label>فایل (اختیاری، هر فرمتی)</label>
            ${fileDropHtml(`field-file-${key}`, 'کلیک کن یا فایل رو بکش اینجا')}
            ${isEdit && item.file ? `<div class="checkbox-row"><input type="checkbox" id="field-remove-file-${key}"><label for="field-remove-file-${key}" style="margin:0">حذف فایل فعلی</label></div>` : ''}
        `;
    } else if (cfg.type === 'link') {
        fieldsHtml += `
            <label>لینک فیلم (اختیاری، خالی بذار یعنی «به زودی»)</label>
            <input type="text" id="field-link-${key}" value="${isEdit ? escapeHtml(item.link || '') : ''}" placeholder="https://...">
        `;
    }

    fieldsHtml += `
        <div class="form-actions">
            <button type="submit" class="btn-submit">${isEdit ? '<i class="ph-bold ph-check"></i> ذخیره تغییرات' : '<i class="ph-bold ph-plus"></i> ساخت'}</button>
            <button type="button" class="btn-cancel" id="cancel-${key}">انصراف</button>
        </div>
        <div class="form-msg" id="msg-${key}"></div>
    `;

    formEl.innerHTML = `<form id="submit-form-${key}">${fieldsHtml}</form>`;
    formEl.classList.add('open');
    formEl.dataset.editingName = isEdit ? item.name : '';

    if (cfg.type === 'dual') {
        delete uploadedFiles[`field-java-${key}`];
        delete uploadedFiles[`field-bedrock-${key}`];
        wireFileDrop(`field-java-${key}`);
        wireFileDrop(`field-bedrock-${key}`);
    } else if (cfg.type === 'single') {
        delete uploadedFiles[`field-file-${key}`];
        wireFileDrop(`field-file-${key}`);
    }

    document.getElementById(`cancel-${key}`).addEventListener('click', () => {
        formEl.classList.remove('open');
        setTimeout(() => { formEl.innerHTML = ''; }, 300);
    });

    document.getElementById(`submit-form-${key}`).addEventListener('submit', (e) => {
        e.preventDefault();
        submitForm(key, isEdit ? item.name : null);
    });

    formEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function submitForm(key, editingName) {
    const cfg = CATEGORIES[key];
    const msgEl = document.getElementById(`msg-${key}`);
    msgEl.textContent = '';
    msgEl.className = 'form-msg';

    const formData = new FormData();

    if (!editingName) {
        const name = document.getElementById(`field-name-${key}`).value.trim();
        if (!name) {
            msgEl.innerHTML = '<i class="ph-fill ph-warning-circle"></i> اسم رو وارد کن';
            msgEl.className = 'form-msg error';
            return;
        }
        formData.append('name', name);
    }

    formData.append('description', document.getElementById(`field-description-${key}`).value.trim());

    if (cfg.compatibility) {
        formData.append('compatibility', document.getElementById(`field-compatibility-${key}`).value.trim());
    }

    if (cfg.type === 'dual') {
        const javaFieldId = `field-java-${key}`;
        const bedrockFieldId = `field-bedrock-${key}`;
        if (uploadedFiles[javaFieldId]) formData.append('java_upload_id', uploadedFiles[javaFieldId].uploadId);
        if (uploadedFiles[bedrockFieldId]) formData.append('bedrock_upload_id', uploadedFiles[bedrockFieldId].uploadId);
        const removeJava = document.getElementById(`field-remove-java-${key}`);
        const removeBedrock = document.getElementById(`field-remove-bedrock-${key}`);
        if (removeJava && removeJava.checked) formData.append('remove_java', 'true');
        if (removeBedrock && removeBedrock.checked) formData.append('remove_bedrock', 'true');
    } else if (cfg.type === 'single') {
        const fileFieldId = `field-file-${key}`;
        if (uploadedFiles[fileFieldId]) formData.append('file_upload_id', uploadedFiles[fileFieldId].uploadId);
        const removeFile = document.getElementById(`field-remove-file-${key}`);
        if (removeFile && removeFile.checked) formData.append('remove_file', 'true');
    } else if (cfg.type === 'link') {
        formData.append('link', document.getElementById(`field-link-${key}`).value.trim());
    }

    const submitBtn = document.querySelector(`#submit-form-${key} .btn-submit`);
    submitBtn.disabled = true;
    submitBtn.innerHTML = 'در حال ارسال... <span class="spinner small"></span>';

    try {
        const url = editingName
            ? `/api/admin/${key}/${encodeURIComponent(editingName)}`
            : `/api/admin/${key}`;
        await apiRequest(url, {
            method: editingName ? 'PUT' : 'POST',
            body: formData,
        });

        msgEl.innerHTML = '<i class="ph-fill ph-check-circle"></i> با موفقیت ذخیره شد';
        msgEl.className = 'form-msg success';
        showToast(editingName ? 'تغییرات ذخیره شد' : 'با موفقیت ساخته شد', 'success');

        setTimeout(() => {
            const formEl = document.getElementById(`form-${key}`);
            formEl.classList.remove('open');
            setTimeout(() => { formEl.innerHTML = ''; }, 300);
            loadCategory(key);
        }, 600);
    } catch (err) {
        msgEl.innerHTML = `<i class="ph-fill ph-x-circle"></i> ${escapeHtml(err.message || 'خطا در ذخیره')}`;
        msgEl.className = 'form-msg error';
        showToast(err.message || 'خطا در ذخیره', 'error');
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = editingName ? '<i class="ph-bold ph-check"></i> ذخیره تغییرات' : '<i class="ph-bold ph-plus"></i> ساخت';
    }
}

// ===== شروع =====
if (adminToken) {
    showDashboard();
}
