<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تست OpenRouter</title>
<style>
  body {
    font-family: Tahoma, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 0 20px;
    background: #f5f5f7;
  }
  h2 { text-align: center; }
  textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    resize: vertical;
  }
  button {
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  #result {
    margin-top: 20px;
    padding: 15px;
    background: white;
    border-radius: 8px;
    min-height: 40px;
    white-space: pre-wrap;
    line-height: 1.8;
  }
  .status { color: #6b7280; font-size: 14px; }
</style>
</head>
<body>

<h2>تست ساده OpenRouter</h2>
<input type="password" id="apiKeyInput" placeholder="کلید API خودت رو اینجا وارد کن (sk-or-v1-...)" style="width:100%; padding:10px; font-size:16px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; margin-bottom:10px;">
<textarea id="userInput" placeholder="پیامت رو اینجا بنویس..."></textarea><br>
<button id="sendBtn" onclick="sendMessage()">ارسال</button>
<div id="result" class="status">جواب اینجا نمایش داده می‌شه...</div>

<script>
// کلید API دیگه داخل کد نیست - کاربر خودش هر بار وارد می‌کنه
// این‌جوری اگه فایل روی گیت‌هاب یا هرجای دیگه public بشه، کلید لو نمی‌ره

// چند مدل رایگان که به ترتیب امتحان می‌شن اگه یکی جواب نداد
const MODELS = [
  "deepseek/deepseek-chat-v3-0324:free",
  "meta-llama/llama-3.3-70b-instruct:free",
  "qwen/qwen-2.5-72b-instruct:free",
  "google/gemini-2.0-flash-exp:free",
  "mistralai/mistral-7b-instruct:free"
];

async function tryModel(model, input, apiKey) {
  const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey,
      "HTTP-Referer": "https://localhost",
      "X-Title": "Test App"
    },
    body: JSON.stringify({
      model: model,
      messages: [
        { role: "user", content: input }
      ]
    })
  });

  const raw = await response.text();
  let data;
  try {
    data = JSON.parse(raw);
  } catch (e) {
    throw new Error("پاسخ غیرمنتظره از سرور (HTTP " + response.status + "): " + raw.slice(0, 300));
  }

  if (!response.ok || data.error) {
    const msg = data.error ? (data.error.message || JSON.stringify(data.error)) : ("HTTP " + response.status);
    throw new Error(msg);
  }

  return data.choices[0].message.content;
}

async function sendMessage() {
  const input = document.getElementById('userInput').value.trim();
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const resultDiv = document.getElementById('result');
  const btn = document.getElementById('sendBtn');

  if (!apiKey) {
    resultDiv.textContent = "اول کلید API رو وارد کن!";
    return;
  }

  if (!input) {
    resultDiv.textContent = "یه پیام بنویس اول!";
    return;
  }

  btn.disabled = true;
  resultDiv.className = "status";

  let lastError = "";

  for (const model of MODELS) {
    resultDiv.textContent = "در حال امتحان مدل: " + model + " ...";
    try {
      const reply = await tryModel(model, input, apiKey);
      resultDiv.textContent = "[مدل استفاده‌شده: " + model + "]\n\n" + reply;
      resultDiv.className = "";
      btn.disabled = false;
      return;
    } catch (err) {
      lastError = model + " => " + err.message;
      console.error(lastError);
    }
  }

  resultDiv.textContent = "همه مدل‌ها خطا دادن.\nآخرین خطا:\n" + lastError + "\n\nاحتمالاً باید توی حساب OpenRouter ایمیلت تایید بشه یا حداقل موجودی (حتی چند دلار) شارژ کنی. به Settings > Credits سر بزن.";
  btn.disabled = false;
}
</script>

</body>
</html>
